spring.application.name=Routing_Filtering
server.port=8080

# Route 1 - forward /example/** to example.org
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=http://example.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**

# Strip the /example prefix before forwarding
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Load balanced route \u2014 lb:// tells gateway to use LoadBalancer
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Manually register instances of example-service (no Eureka needed)
spring.cloud.loadbalancer.instances.example-service[0].uri=http://localhost:8081
spring.cloud.loadbalancer.instances.example-service[1].uri=http://localhost:8082


# Gateway route with circuit breaker filter
spring.cloud.gateway.routes[0].id=resilience_route
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/resilient/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[0].filters[1]=CircuitBreaker=name=exampleCircuitBreaker,fallbackUri=forward:/fallback

# Circuit Breaker config
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.register-health-indicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.permitted-number-of-calls-in-half-open-state=3

# Time limiter (timeout per request)
resilience4j.timelimiter.instances.exampleCircuitBreaker.timeout-duration=3s

# Expose actuator health endpoint to see circuit breaker state
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-details=always